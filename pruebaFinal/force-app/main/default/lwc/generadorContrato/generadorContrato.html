<template>
    <lightning-card title="Gestión de Contrato" icon-name="standard:contract">
        <div class="slds-p-around_medium">
            
            <template if:false={mostrarPlantilla}>
                <div class="slds-align_absolute-center slds-m-top_medium">
                    <template if:true={isGenerating}>
                        <lightning-spinner alternative-text="Generando..." size="small"></lightning-spinner>
                    </template>
                    <lightning-button 
                        label="Generar Contrato" 
                        variant="brand" 
                        icon-name="utility:document"
                        onclick={handleGenerar}
                        disabled={isGenerating}>
                    </lightning-button>
                </div>
            </template>

            <template if:true={mostrarPlantilla}>
                
                <div class="slds-box slds-m-bottom_medium" style="height: 500px; padding: 0;">
                    <template if:true={pdfGeneradoUrl}>
                        <iframe src={pdfGeneradoUrl} width="100%" height="100%" style="border: none;"></iframe>
                    </template>
                    <template if:false={pdfGeneradoUrl}>
                        <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                            Visualización no disponible. El contrato fue generado previamente.
                        </div>
                    </template>
                </div>

                <div class="slds-box slds-box_x-small slds-theme_shade">
                    <p class="slds-m-bottom_small"><strong>Subir Contrato Firmado por el Cliente (PDF):</strong></p>
                    
                    <template if:false={contratoId}>
                        <lightning-file-upload
                            name="contrato_firmado"
                            accept=".pdf"
                            record-id={recordId}
                            onuploadfinished={handleUploadFinished}>
                        </lightning-file-upload>
                    </template>

                    <template if:true={contratoId}>
                        <div class="slds-media slds-media_center">
                            <div class="slds-media__figure">
                                <lightning-icon icon-name="doctype:pdf" size="medium"></lightning-icon>
                            </div>
                            <div class="slds-media__body">
                                <p class="slds-text-color_success"><strong>Contrato firmado cargado con éxito.</strong></p>
                            </div>
                            <div class="slds-col">
                                <lightning-button-icon icon-name="utility:delete" onclick={handleRemove} variant="error" title="Eliminar/Reemplazar" class="slds-m-left_xs"></lightning-button-icon>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
